<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小恐龍特別行動</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main class="game-shell">
    <section class="hud">
      <div>
        <p class="label">分數</p>
        <p id="score">0</p>
      </div>
      <div>
        <p class="label">生命</p>
        <p id="lives">4</p>
      </div>
      <div>
        <p class="label">關卡</p>
        <p id="mode">草原熱身</p>
      </div>
      <div>
        <p class="label">提示</p>
        <p id="chapterHint">熟悉跳躍節奏</p>
      </div>
    </section>

    <section class="stage-wrap">
      <div id="stage" class="stage chapter-plains">
        <div class="sun"></div>
        <div class="stars"></div>
        <div class="wind"></div>
        <div class="danger-lines"></div>
        <div class="chapter-banner" id="chapterBanner">草原熱身</div>
        <div id="dino" class="dino">
          <div class="eye"></div>
          <div class="leg leg-front"></div>
          <div class="leg leg-back"></div>
        </div>
        <div class="ground"></div>
        <div id="specialPortal" class="special-portal hidden"></div>
        <div id="message" class="message visible">
          <h1>小恐龍特別行動</h1>
          <p>按空白鍵開始，空白鍵跳躍，方向下鍵可以蹲下或快速落地。</p>
          <p>你會依序闖過草原、沙暴、遺跡、低重力流星區與疾速衝刺關卡。</p>
        </div>
      </div>
    </section>

    <section class="controls">
      <button id="startBtn" type="button">開始遊戲</button>
      <button id="restartBtn" type="button">重新開始</button>
    </section>
  </main>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
