<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小恐龍冒險</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main class="game-shell">
    <section class="hud">
      <div>
        <p class="label">分數</p>
        <p id="score">0</p>
      </div>
      <div>
        <p class="label">生命</p>
        <p id="lives">3</p>
      </div>
      <div>
        <p class="label">模式</p>
        <p id="mode">一般模式</p>
      </div>
    </section>

    <section class="stage-wrap">
      <div id="stage" class="stage">
        <div class="sun"></div>
        <div class="stars"></div>
        <div id="dino" class="dino">
          <div class="eye"></div>
          <div class="leg leg-front"></div>
          <div class="leg leg-back"></div>
        </div>
        <div class="ground"></div>
        <div id="specialPortal" class="special-portal hidden"></div>

        <aside id="goodAssistant" class="assistant assistant-good" aria-live="polite">
          <div class="assistant-avatar">+</div>
          <p id="goodAssistantText">我會幫你加油，放心衝吧！</p>
        </aside>

        <aside id="badAssistant" class="assistant assistant-bad" aria-live="polite">
          <div class="assistant-avatar">-</div>
          <p id="badAssistantText">你大概撐不了多久。</p>
        </aside>

        <div id="message" class="message visible">
          <h1>小恐龍冒險</h1>
          <p>按空白鍵開始跳躍，方向下鍵可以蹲下。避開障礙，撐得越久分數越高。</p>
          <p>當你進入特殊模式時，畫面會變成夜晚，還會有更多驚喜與挑戰。</p>
        </div>
      </div>
    </section>

    <section class="controls">
      <button id="startBtn" type="button">開始遊戲</button>
      <button id="restartBtn" type="button">重新開始</button>
    </section>
  </main>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
